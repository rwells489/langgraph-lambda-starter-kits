AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  LangGraph Lambda Starter Kit - Tier 2
  A LangGraph agent with memory (DynamoDB) and multiple tools (Calculator, DuckDuckGo Search) on AWS Lambda.

Globals:
  Function:
    Timeout: 15
    MemorySize: 1536
    Runtime: nodejs18.x
    Handler: src/handlers/graph-handler.handler
    Environment:
      Variables:
        CONVERSATION_TABLE: !Ref ConversationsTable

Resources:
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: LangGraphConversations
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Optional: Add TTL for automatic cleanup (expire conversations after 7 days)
      # Note: You'd need to add a ttl attribute in your save logic (epoch timestamp)

  GraphHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Policies:
        # Allow the function to interact with DynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBWritePolicy:
            TableName: !Ref ConversationsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /chat
            Method: post

Outputs:
  GraphHandlerApi:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/chat/"
  GraphHandlerFunction:
    Description: "LangGraph Lambda Function ARN"
    Value: !GetAtt GraphHandlerFunction.Arn
  GraphHandlerFunctionIamRole:
    Description: "Implicit IAM Role created for the function"
    Value: !GetAtt GraphHandlerFunctionRole.Arn
  ConversationsTableName:
    Description: "Name of the DynamoDB table for conversation memory"
    Value: !Ref ConversationsTable